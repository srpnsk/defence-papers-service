xt"}, {"id": "applicant_artciles_number_rewiewed_W", "value": "\u0442\u0440\u0451\u0445", "type": "string", "label": "\u0427\u0438\u0441\u043b\u043e \u043e\u0441\u043d\u043e\u0432\u043d\u044b\u0445 \u0441\u0442\u0430\u0442\u0435\u0439 \u0441\u043e\u0438\u0441\u043a\u0430\u0442\u0435\u043b\u044f, \u043f\u043e \u043a\u043e\u0442\u043e\u0440\u044b\u043c \u043f\u0440\u043e\u0432\u043e\u0434\u0438\u0442\u0441\u044f \u0437\u0430\u0449\u0438\u0442\u0430, \u043f\u0440\u043e\u043f\u0438\u0441\u044c\u044e, \u0440\u043e\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u043f\u0430\u0434\u0435\u0436", "section": "20 \u0417\u0430\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u043a\u043e\u043c\u0438\u0441\u0441\u0438\u0438 \u0414\u0421 \u043f\u043e \u043f\u0440\u0435\u0434\u0432\u0430\u0440\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u043c\u0443 \u0440\u0430\u0441\u0441\u043c\u043e\u0442\u0440\u0435\u043d\u0438\u044e", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "data_publishing_MEPhI", "value": "01~\u043d\u043e\u044f\u0431\u0440\u044f 2026~\u0433.", "type": "string", "label": "\u0414\u0430\u0442\u0430 \u043f\u0443\u0431\u043b\u0438\u043a\u0430\u0446\u0438\u0438 \u043e\u0431\u044a\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u043e \u0437\u0430\u0449\u0438\u0442\u0435 \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "section": "21 \u0421\u043a\u0440\u0438\u043d\u0448\u043e\u0442 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "link_screenshot_publishing_MEPhI", "value": "https://ds.mephi.ru/shared/dissertations", "type": "string", "label": "\u0421\u0441\u044b\u043b\u043a\u0430 \u043d\u0430 \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0443 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u0434\u0438\u0441\u0441\u0435\u0440\u0442\u0430\u0446\u0438\u0438", "section": "21 \u0421\u043a\u0440\u0438\u043d\u0448\u043e\u0442 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "link_text_publishing_MEPhI", "value": "https://ds.mephi.ru/shared/dissertations/...", "type": "string", "label": "\u0421\u0441\u044b\u043b\u043a\u0430 \u043d\u0430 \u0442\u0435\u043a\u0441\u0442 \u0434\u0438\u0441\u0441\u0435\u0440\u0442\u0430\u0446\u0438\u0438", "section": "21 \u0421\u043a\u0440\u0438\u043d\u0448\u043e\u0442 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "file": "Sources/variables_02_input.tex", "inputType": "text"}].map(f => {
            if (f.value && typeof f.value === 'string') {
                f.value = f.value.replace(/~/g, ' ');
            }
            
            // Если поле пустое, но оно похоже на повторяющееся (имеет суффикс _1, _2 и т.д.),
            // заполняем его значением по умолчанию, чтобы избежать пустых полей.
            if ((!f.value || f.value.trim() === '') && /_\d+$/.test(f.id)) {
                f.value = 'Заполните данные';
            }

            const labelLower = (f.label || '').toLowerCase();
            if (labelLower.includes('степень') && !labelLower.includes('вместе')) {
                f.inputType = 'degree_select';
            } else if (labelLower.includes('звание') && !labelLower.includes('название') && !labelLower.includes('степень')) {
                f.inputType = 'title_select';
            }
            return f;
        });
        
        const SPECIALTIES = [
            "1.1.1", "1.1.2", "6.6.5", "6.6.6", "6.6.7", "13.13.13", "14.14.14" // example list
        ];

        const App = () => {
            const [appState, setAppState] = useState('login'); // login | dashboard | generator
            const [isPdfLoading, setIsPdfLoading] = useState(false);

            const [drafts, setDrafts] = useState(() => {
                const saved = localStorage.getItem('tex_drafts');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('tex_drafts', JSON.stringify(drafts));
            }, [drafts]);

            const [fields, setFields] = useState(initialFields);
            const [currentStep, setCurrentStep] = useState(0);
            const [isMobile, setIsMobile] = useState(false);
            const [showErrors, setShowErrors] = useState(false);

            useEffect(() => {
                const checkMobile = () => setIsMobile(window.innerWidth < 768);
                checkMobile();
                window.addEventListener('resize', checkMobile);
                return () => window.removeEventListener('resize', checkMobile);
            }, []);

            // Group fields by file -> section
            const steps = useMemo(() => {
                const grouped = [];
                const files = [...new Set(fields.map(f => f.file))];
                files.forEach(file => {
                    const fileFields = fields.filter(f => f.file === file);
                    const sections = [...new Set(fileFields.map(f => f.section))];
                    
                    sections.forEach(section => {
                        const rawFields = fileFields.filter(f => f.section === section);
                        const groups = [];
                        const groupedByName = {};
                        const processedIds = new Set();
                        
                        rawFields.forEach(f => {
                            const match = f.id.match(/^(.*?)_?(\d+)$/);
                            if (match) {
                                const base = match[1];
                                if (!groupedByName[base]) groupedByName[base] = [];
                                groupedByName[base].push(f);
                            }
                        });
                        
                        const repeatableBases = Object.keys(groupedByName).filter(base => 
                            groupedByName[base].some(f => f.id.endsWith('_1') || f.id.endsWith('1'))
                        );

                        rawFields.forEach(f => {
                            if (processedIds.has(f.id)) return;
                            const match = f.id.match(/^(.*?)_?(\d+)$/);
                            
                            if (match && repeatableBases.includes(match[1])) {
                                const base = match[1];
                                const items = groupedByName[base];
                                
                                let maxIdx = 0;
                                items.forEach(it => {
                                    const m = it.id.match(/^(.*?)_?(\d+)$/);
                                    if(m) maxIdx = Math.max(maxIdx, parseInt(m[2], 10));
                                });
                                
                                groups.push({
                                    type: 'repeatable',
                                    base: base,
                                    label: f.label || base,
                                    items: items,
                                    maxIdx: maxIdx
                                });
                                items.forEach(it => processedIds.add(it.id));
                            } else {
                                groups.push({
                                    type: 'single',
                                    field: f
                                });
                                processedIds.add(f.id);
                            }
                        });

                        grouped.push({
                            file,
                            section,
                            groups: groups
                        });
                    });
                });
                return grouped;
            }, [fields]);

            const validateField = (field) => {
                if (!field.value || field.value.trim() === '') return 'Поле обязательно для заполнения';
                
                const label = field.label || '';
                const baseIdLower = field.id ? field.id.toLowerCase() : '';
                
                if (label.includes('Фамилия Имя Отчество')) {
                    if (!/^[А-ЯЁ][А-ЯЁа-яё\-\s]*\s+[А-ЯЁ][а-яё\-]+(?:\s+[А-ЯЁ][а-яё\-]+)?$/.test(field.value.trim())) {
                        return 'Формат: Иванов Иван Иванович или Иванов Иван';
                    }
                } else if (label.includes('Фамилия И.О.') || (baseIdLower.includes('_name_i') && !label.includes('Фамилия Имя Отчество'))) {
                    if (!/^[А-ЯЁ][А-ЯЁа-яё\-\s]*\s+[А-ЯЁ]\.(?:\s?[А-ЯЁ]\.)?$/.test(field.value.trim())) {
                        return 'Формат: Иванов И.И. или Иванов И.';
                    }
                } else if (label.includes('Фамилия И.')) {
                    if (!/^[А-ЯЁ][А-ЯЁа-яё\-\s]*\s+[А-ЯЁ]\.$/.test(field.value.trim())) {
                        return 'Формат: Иванов И.';
                    }
                }
                return null;
            };

            const isStepValid = (step) => {
                for (const group of step.groups) {
                    if (group.type === 'single') {
                        if (validateField(group.field)) return false;
                    } else {
                        for (const item of group.items) {
                            if (validateField(item)) return false;
                        }
                    }
                }
                return true;
            };

            const handleChange = (id, newValue) => {
                setFields(fields.map(f => f.id === id ? { ...f, value: newValue } : f));
            };

            const addRepeatableField = (base, maxIdx, section, file, type, label) => {
                const newIdx = maxIdx + 1;
                const sample = fields.find(f => f.id.startsWith(base));
                let delimiter = "_";
                let sampleValue = '';
                if(sample) {
                    const match = sample.id.match(/^(.*?)(_?)(\d+)$/);
                    if(match) delimiter = match[2];
                    sampleValue = sample.value || '';
                }
                
                // Если образец пустой, указываем текст по умолчанию, чтобы поле не было пустым
                if (!sampleValue || sampleValue.trim() === '') {
                    sampleValue = 'Заполните данные';
                }

                const newId = `${base}${delimiter}${newIdx}`;
                
                const newField = {
                    id: newId,
                    value: sampleValue,
                    type: type,
                    label: `${label} (добавленный)`,
                    section: section,
                    file: file
                };
                setFields([...fields, newField]);
            };

            const removeRepeatableField = (id) => {
                setFields(fields.filter(f => f.id !== id));
            };

            const generateTex = (file) => {
                const fileFields = fields.filter(f => f.file === file);
                let mapBySection = {};
                fileFields.forEach(f => {
                    if (!mapBySection[f.section]) mapBySection[f.section] = [];
                    mapBySection[f.section].push(f);
                });

                let tex = '';
                for (const section in mapBySection) {
                    tex += `% ${section}\n`;
                    mapBySection[section].forEach(f => {
                        let finalValue = f.value;
                        // Форматируем инициалы и ФИО для корректного отображения в TeX (заменяем пробелы перед инициалами на неразрывный пробел ~)
                        if (f.type === 'string' && typeof finalValue === 'string') {
                            finalValue = finalValue.replace(/([А-ЯЁ][а-яё\-]+)\s+([А-ЯЁ]\.)/g, '$1~$2'); // Иванов И. -> Иванов~И.
                            finalValue = finalValue.replace(/([А-ЯЁ]\.)\s?([А-ЯЁ]\.)/g, '$1$2'); // И. И. -> И.И.
                        }
                        if (f.type === 'string') {
                            tex += `\\setkomavar{${f.id}}{${finalValue}} % ${f.label}\n`;
                        } else {
                            tex += `\\setcounter{${f.id}}{${finalValue}} % ${f.label}\n`;
                        }
                    });
                    tex += '\n';
                }
                return tex;
            };

            const saveCurrentDraft = () => {
                const titleField = fields.find(f => f.label && f.label.toLowerCase().includes('название диссертации'));
                const title = titleField && titleField.value && titleField.value.length > 3 ? titleField.value : 'Диссертация без названия';
                
                const newDraft = {
                    id: Date.now(),
                    date: new Date().toLocaleString('ru-RU'),
                    title: title,
                    fields: fields
                };
                setDrafts(prev => [newDraft, ...prev]);
            };

            const handleSendTeX = () => {
                const files = [...new Set(fields.map(f => f.file))];
                const zip = new JSZip();
                
                files.forEach(file => {
                    const tex = generateTex(file);
                    zip.file(file.split('/').pop(), tex);
                });
                
                zip.generateAsync({ type: "blob" }).then(function(content) {
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "tex_sources.zip";
                    a.click();
                    saveCurrentDraft();
                });
            };

            const handleSendPDF = () => {
                setIsPdfLoading(true);
                // Mock PDF generation (обычно здесь отправка JSON на бэкенд, который собирает LaTeX -> PDF)
                setTimeout(() => {
                    setIsPdfLoading(false);
                    alert('Для реальной генерации PDF нужен backend-сервер (например, с pdflatex).\n\nВ текущей frontend-версии сформирован ZIP-архив с готовыми .tex файлами, которые можно скомпилировать локально или в Overleaf.');
                    handleSendTeX(); // Пока в качестве фолбэка просто отдаем исходники в zip
                }, 1500);
            };

            const step = steps[currentStep];

            if (appState === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                        <div className="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 space-y-6">
                            <div className="text-center">
                                <h1 className="text-2xl font-bold text-gray-900">Вход в систему</h1>
                                <p className="text-gray-500 mt-2">Генератор документов</p>
                            </div>
                            <form className="space-y-4" onSubmit={(e) => { e.preventDefault(); setAppState('dashboard'); }}>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Email / Логин</label>
                                    <input type="text" required className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="admin@example.com" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Пароль</label>
                                    <input type="password" required className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••" />
                                </div>
                                <button type="submit" className="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                    Войти
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (appState === 'dashboard') {
                return (
                    <div className="min-h-screen bg-gray-100">
                        <nav className="bg-white shadow">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <div className="flex justify-between h-16">
                                    <div className="flex items-center">
                                        <h1 className="text-xl font-bold text-blue-600">Личный кабинет</h1>
                                    </div>
                                    <div className="flex items-center">
                                        <button onClick={() => setAppState('login')} className="ml-4 text-sm text-gray-500 hover:text-gray-700">Выйти</button>
                                    </div>
                                </div>
                            </div>
                        </nav>
                        <main className="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
                            <div className="bg-white rounded-lg shadow px-5 py-6 sm:px-6">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg leading-6 font-medium text-gray-900">Ваши документы</h2>
                                    <button
                                        onClick={() => { setFields(initialFields); setCurrentStep(0); setAppState('generator'); }}
                                        className="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                                    >
                                        + Создать новые
                                    </button>
                                </div>
                                {drafts.length === 0 ? (
                                    <div className="border-4 border-dashed border-gray-200 rounded-lg h-64 flex flex-col items-center justify-center text-center p-4">
                                        <svg className="mx-auto h-12 w-12 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                        <h3 className="mt-2 text-sm font-medium text-gray-900">Нет сохранённых документов</h3>
                                        <p className="mt-1 text-sm text-gray-500">Они появятся здесь после генерации.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                        {drafts.map(draft => (
                                            <div key={draft.id} className="relative rounded-lg border border-gray-300 bg-white px-6 py-5 shadow-sm flex items-center space-x-3 hover:border-blue-500 focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500 transition-colors cursor-pointer" onClick={() => { setFields(draft.fields); setAppState('generator'); setCurrentStep(0); }}>
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-sm font-medium text-gray-900 truncate" title={draft.title}>{draft.title}</p>
                                                    <p className="text-sm text-gray-500 truncate">{draft.date}</p>
                                                </div>
                                                <div className="flex-shrink-0">
                                                    <button onClick={(e) => { e.stopPropagation(); setDrafts(drafts.filter(d => d.id !== draft.id)); }} className="text-red-500 hover:text-red-700 p-2 z-10 relative" title="Удалить">
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                            <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                );
            }

            return (
                <div className={`flex flex-col bg-gray-100 ${isMobile ? 'fixed inset-0 z-50' : 'fixed inset-0 z-50 items-center justify-center p-4 sm:p-6'}`}>
                    {!isMobile && (
                        <div className="w-full max-w-3xl mb-4 shrink-0">
                            <button onClick={() => setAppState('dashboard')} className="text-gray-500 hover:text-gray-700 text-sm font-medium flex items-center">
                                &larr; Вернуться в ЛК
                            </button>
                        </div>
                    )}
                    <div className={`w-full max-w-3xl bg-white flex flex-col ${isMobile ? 'h-full flex-1' : 'shadow-xl rounded-2xl overflow-hidden h-[800px] max-h-full'}`}>
                        {isMobile && (
                            <div className="bg-gray-100 p-3 shrink-0 flex items-center justify-between border-b">
                                <button onClick={() => setAppState('dashboard')} className="text-gray-600 hover:text-gray-900 text-sm font-medium flex items-center">
                                    &larr; Вернуться в ЛК
                                </button>
                            </div>
                        )}
                        <div className="bg-blue-600 p-4 sm:p-6 text-white flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-2 sm:space-y-0 shrink-0">
                            <div>
                                {!IS_PRODUCTION && <h1 className="text-xl sm:text-2xl font-bold">{step.file.split('/').pop()}</h1>}
                                <h2 className={`text-sm opacity-90 ${IS_PRODUCTION ? 'sm:text-2xl font-bold' : 'sm:text-lg'}`}>
                                    {step.section}
                                </h2>
                            </div>
                            <div className="text-xs sm:text-sm font-medium bg-blue-700 px-3 py-1 rounded-full self-start sm:self-auto">
                                Шаг {currentStep + 1} из {steps.length}
                            </div>
                        </div>
                        
                        <div className={`p-4 sm:p-8 flex-1 overflow-y-auto space-y-6 sm:space-y-8`}>
                            {step.groups.map(group => {
                                if (group.type === 'single') {
                                    const field = group.field;
                                    const error = validateField(field);
                                    return (
                                        <div key={field.id} className="flex flex-col">
                                            <label className="text-sm font-semibold text-gray-700 mb-2">
                                                {field.label} {!IS_PRODUCTION && <span className="text-xs text-gray-400 font-normal">({field.id})</span>}
                                            </label>
                                            
                                            {field.inputType === 'specialty_select' ? (
                                                <select
                                                    value={field.value}
                                                    onChange={(e) => handleChange(field.id, e.target.value)}
                                                    className={`border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm`}
                                                >
                                                    <option value="">Выберите специальность</option>
                                                    {SPECIALTIES.map(s => (
                                                        <option key={s} value={s}>{s}</option>
                                                    ))}
                                                </select>
                                            ) : field.inputType === 'degree_select' ? (
                                                <select
                                                    value={field.value}
                                                    onChange={(e) => handleChange(field.id, e.target.value)}
                                                    className={`border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm`}
                                                >
                                                    <option value="">Выберите степень</option>
                                                    {DEGREES.map(s => (
                                                        <option key={s} value={s}>{s}</option>
                                                    ))}
                                                </select>
                                            ) : field.inputType === 'title_select' ? (
                                                <select
                                                    value={field.value}
                                                    onChange={(e) => handleChange(field.id, e.target.value)}
                                                    className={`border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm`}
                                                >
                                                    <option value="">Выберите звание</option>
                                                    {TITLES.map(s => (
                                                        <option key={s} value={s}>{s}</option>
                                                    ))}
                                                </select>
                                            ) : field.inputType === 'number' ? (
                                                <input
                                                    type="number"
                                                    value={field.value}
                                                    onChange={(e) => handleChange(field.id, e.target.value)}
                                                    className={`border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm`}
                                                />
                                            ) : (
                                                <textarea
                                                    rows="3"
                                                    value={field.value}
                                                    onChange={(e) => handleChange(field.id, e.target.value)}
                                                    className={`border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm min-h-[60px]`}
                                                />
                                            )}
                                            {showErrors && error && <span className="text-red-500 text-xs mt-1">{error}</span>}
                                        </div>
                                    );
                                } else {
                                    const items = [...group.items].sort((a,b) => {
                                        const m1 = a.id.match(/\d+$/);
                                        const m2 = b.id.match(/\d+$/);
                                        return (m1 ? parseInt(m1[0], 10) : 0) - (m2 ? parseInt(m2[0], 10) : 0);
                                    });
                                    const sampleType = items[0]?.type || 'string';
                                    
                                    return (
                                        <div key={group.base} className="bg-gray-50 p-4 border border-gray-200 rounded-xl flex flex-col space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center mb-2">
                                                <h3 className="font-bold text-gray-800 text-sm">
                                                    {group.label} {!IS_PRODUCTION && <span className="text-xs text-gray-400 font-normal ml-2">({group.base}_N)</span>}
                                                </h3>
                                                <button onClick={() => addRepeatableField(group.base, group.maxIdx, step.section, step.file, sampleType, group.label)} className="bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1.5 rounded-md text-xs font-semibold transition-colors shadow-sm">
                                                    + Добавить пункт
                                                </button>
                                            </div>
                                            {items.map(field => {
                                                const error = validateField(field);
                                                return (
                                                <div key={field.id} className={`flex space-x-2 sm:space-x-3 items-start bg-white p-2 sm:p-3 rounded-lg border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-100'} shadow-sm relative group`}>
                                                    <div className="flex-1 flex flex-col w-full">
                                                        {!IS_PRODUCTION && <label className="text-xs font-semibold text-gray-500 mb-1">{field.id}</label>}
                                                        {field.inputType === 'number' ? (
                                                            <input type="number" value={field.value} onChange={(e) => handleChange(field.id, e.target.value)} className={`border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-md px-2 sm:px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none w-full`} />
                                                        ) : (
                                                            <textarea rows="2" value={field.value} onChange={(e) => handleChange(field.id, e.target.value)} className={`border ${showErrors && error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-md px-2 sm:px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none min-h-[40px] resize-y w-full`} />
                                                        )}
                                                        {showErrors && error && <span className="text-red-500 text-xs mt-1">{error}</span>}
                                                    </div>
                                                    <button onClick={() => removeRepeatableField(field.id)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded self-center transition-colors flex-shrink-0" title="Удалить">
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                            <path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" />
                                                        </svg>
                                                    </button>
                                                </div>
                                                );
                                            })}
                                            {items.length === 0 && <p className="text-sm text-gray-400 italic text-center py-2">Нет пунктов. Нажмите добавить.</p>}
                                        </div>
                                    );
                                }
                            })}
                        </div>

                        <div className={`bg-gray-50 border-t border-gray-200 p-4 flex justify-between shadow-inner shrink-0`}>
                            <button
                                disabled={currentStep === 0}
                                onClick={() => {
                                    setShowErrors(false);
                                    setCurrentStep(prev => prev - 1);
                                }}
                                className={`px-4 sm:px-6 py-2 rounded-lg font-medium transition-colors ${currentStep === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}
                            >
                                Назад
                            </button>
                            
                            {currentStep === steps.length - 1 ? (
                                <div className="flex space-x-2">
                                    <button
                                        onClick={() => {
                                            if (isStepValid(step)) {
                                                handleSendTeX();
                                            } else {
                                                setShowErrors(true);
                                            }
                                        }}
                                        className="px-4 py-2 rounded-lg font-bold bg-gray-500 hover:bg-gray-600 text-white transition-colors shadow text-sm"
                                    >
                                        Скачать .tex
                                    </button>
                                    <button
                                        onClick={() => {
                                            if (isStepValid(step)) {
                                                handleSendPDF();
                                            } else {
                                                setShowErrors(true);
                                            }
                                        }}
                                        disabled={isPdfLoading}
                                        className={`px-4 sm:px-6 py-2 rounded-lg font-bold text-white transition-colors shadow ${isPdfLoading ? 'bg-green-400 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600'}`}
                                    >
                                        {isPdfLoading ? 'Генерация...' : 'Скачать PDF'}
                                    </button>
                                </div>
                            ) : (
                                <button
                                    onClick={() => {
                                        if (isStepValid(step)) {
                                            setShowErrors(false);
                                            setCurrentStep(prev => prev + 1);
                                        } else {
                                            setShowErrors(true);
                                        }
                                    }}
                                    className="px-4 sm:px-6 py-2 rounded-lg font-bold bg-blue-600 hover:bg-blue-700 text-white transition-colors shadow"
                                >
                                    Вперед
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
