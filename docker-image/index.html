les_02_input.tex"}];

        const App = () => {
            const [fields, setFields] = useState(initialFields);
            const [activeFile, setActiveFile] = useState('Sources/variables_common_input.tex');

            const files = useMemo(() => [...new Set(fields.map(f => f.file))], [fields]);

            const handleChange = (id, newValue) => {
                setFields(fields.map(f => f.id === id ? { ...f, value: newValue } : f));
            };

            const generateTex = (file) => {
                const fileFields = fields.filter(f => f.file === file);
                let mapBySection = {};
                fileFields.forEach(f => {
                    if (!mapBySection[f.section]) mapBySection[f.section] = [];
                    mapBySection[f.section].push(f);
                });

                let tex = '';
                for (const section in mapBySection) {
                    tex += `% ${section}\n`;
                    mapBySection[section].forEach(f => {
                        if (f.type === 'string') {
                            tex += `\\\\setkomavar{${f.id}}{${f.value}} % ${f.label}\n`;
                        } else {
                            tex += `\\\\setcounter{${f.id}}{${f.value}} % ${f.label}\n`;
                        }
                    });
                    tex += '\n';
                }
                return tex;
            };

            const downloadAll = () => {
                files.forEach(file => {
                    const tex = generateTex(file);
                    const blob = new Blob([tex], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.split('/').pop();
                    a.click();
                });
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <div className="w-64 bg-white shadow-lg flex flex-col">
                        <div className="p-4 bg-blue-600 text-white font-bold text-lg">Файлы</div>
                        <ul className="flex-1 overflow-y-auto p-2 space-y-2">
                            {files.map(file => (
                                <li key={file}>
                                    <button
                                        className={`w-full text-left px-3 py-2 rounded-lg text-sm ${activeFile === file ? 'bg-blue-100 text-blue-700 font-bold' : 'hover:bg-gray-100'}`}
                                        onClick={() => setActiveFile(file)}
                                    >
                                        {file.split('/').pop()}
                                    </button>
                                </li>
                            ))}
                        </ul>
                        <div className="p-4 border-t">
                            <button onClick={downloadAll} className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded shadow">
                                Скачать всё
                            </button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-8">
                        <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                            <h2 className="text-2xl font-bold mb-6 text-gray-800">{activeFile.split('/').pop()}</h2>
                            {
                                Object.entries(
                                    fields.filter(f => f.file === activeFile)
                                    .reduce((acc, f) => {
                                        acc[f.section] = acc[f.section] || [];
                                        acc[f.section].push(f);
                                        return acc;
                                    }, {})
                                ).map(([section, sectionFields]) => (
                                    <div key={section} className="mb-8">
                                        <h3 className="text-xl font-bold text-gray-700 border-b pb-2 mb-4">{section}</h3>
                                        <div className="space-y-4">
                                            {sectionFields.map(field => (
                                                <div key={field.id} className="flex flex-col">
                                                    <label className="text-sm font-semibold text-gray-600 mb-1">
                                                        {field.label} ({field.id})
                                                    </label>
                                                    <input
                                                        type={field.type === 'number' ? 'number' : 'text'}
                                                        value={field.value}
                                                        onChange={(e) => handleChange(field.id, e.target.value)}
                                                        className="border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
