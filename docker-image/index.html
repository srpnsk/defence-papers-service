 \u0441\u043e\u0432\u0435\u0442\u0430 \u043e \u043f\u0440\u0438\u0451\u043c\u0435 \u043a \u0437\u0430\u0449\u0438\u0442\u0435", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "19_2_commission_speaker_degree", "value": "\u0434.\u043a.\u043d.", "type": "string", "label": "\u0421\u0442\u0435\u043f\u0435\u043d\u044c \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u0438\u0432\u0448\u0435\u0433\u043e \u0434\u043e\u043a\u043b\u0430\u0434", "section": "19_2 \u041f\u0440\u043e\u0442\u043e\u043a\u043e\u043b \u0441\u043e\u0432\u0435\u0442\u0430 \u043e \u043f\u0440\u0438\u0451\u043c\u0435 \u043a \u0437\u0430\u0449\u0438\u0442\u0435", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "19_2_vote_results", "value": "15", "type": "string", "label": "\u041a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e \u0433\u043e\u043b\u043e\u0441\u043e\u0432 \"\u0437\u0430\"", "section": "19_2 \u041f\u0440\u043e\u0442\u043e\u043a\u043e\u043b \u0441\u043e\u0432\u0435\u0442\u0430 \u043e \u043f\u0440\u0438\u0451\u043c\u0435 \u043a \u0437\u0430\u0449\u0438\u0442\u0435", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "applicant_artciles_number_total_W", "value": "\u0447\u0435\u0442\u044b\u0440\u043d\u0430\u0434\u0446\u0430\u0442\u0438", "type": "string", "label": "\u0427\u0438\u0441\u043b\u043e \u043f\u0443\u0431\u043b\u0438\u043a\u0430\u0446\u0438\u0439 \u0441\u043e\u0438\u0441\u043a\u0430\u0442\u0435\u043b\u044f, \u043f\u0440\u043e\u043f\u0438\u0441\u044c\u044e, \u0434\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u043f\u0430\u0434\u0435\u0436", "section": "20 \u0417\u0430\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u043a\u043e\u043c\u0438\u0441\u0441\u0438\u0438 \u0414\u0421 \u043f\u043e \u043f\u0440\u0435\u0434\u0432\u0430\u0440\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u043c\u0443 \u0440\u0430\u0441\u0441\u043c\u043e\u0442\u0440\u0435\u043d\u0438\u044e", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "applicant_artciles_number_rewiewed_W", "value": "\u0442\u0440\u0451\u0445", "type": "string", "label": "\u0427\u0438\u0441\u043b\u043e \u043e\u0441\u043d\u043e\u0432\u043d\u044b\u0445 \u0441\u0442\u0430\u0442\u0435\u0439 \u0441\u043e\u0438\u0441\u043a\u0430\u0442\u0435\u043b\u044f, \u043f\u043e \u043a\u043e\u0442\u043e\u0440\u044b\u043c \u043f\u0440\u043e\u0432\u043e\u0434\u0438\u0442\u0441\u044f \u0437\u0430\u0449\u0438\u0442\u0430, \u043f\u0440\u043e\u043f\u0438\u0441\u044c\u044e, \u0440\u043e\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u043f\u0430\u0434\u0435\u0436", "section": "20 \u0417\u0430\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u043a\u043e\u043c\u0438\u0441\u0441\u0438\u0438 \u0414\u0421 \u043f\u043e \u043f\u0440\u0435\u0434\u0432\u0430\u0440\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u043c\u0443 \u0440\u0430\u0441\u0441\u043c\u043e\u0442\u0440\u0435\u043d\u0438\u044e", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "data_publishing_MEPhI", "value": "01~\u043d\u043e\u044f\u0431\u0440\u044f 2026~\u0433.", "type": "string", "label": "\u0414\u0430\u0442\u0430 \u043f\u0443\u0431\u043b\u0438\u043a\u0430\u0446\u0438\u0438 \u043e\u0431\u044a\u044f\u0432\u043b\u0435\u043d\u0438\u044f \u043e \u0437\u0430\u0449\u0438\u0442\u0435 \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "section": "21 \u0421\u043a\u0440\u0438\u043d\u0448\u043e\u0442 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "link_screenshot_publishing_MEPhI", "value": "https://ds.mephi.ru/shared/dissertations", "type": "string", "label": "\u0421\u0441\u044b\u043b\u043a\u0430 \u043d\u0430 \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0443 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u0434\u0438\u0441\u0441\u0435\u0440\u0442\u0430\u0446\u0438\u0438", "section": "21 \u0421\u043a\u0440\u0438\u043d\u0448\u043e\u0442 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "file": "Sources/variables_02_input.tex", "inputType": "text"}, {"id": "link_text_publishing_MEPhI", "value": "https://ds.mephi.ru/shared/dissertations/...", "type": "string", "label": "\u0421\u0441\u044b\u043b\u043a\u0430 \u043d\u0430 \u0442\u0435\u043a\u0441\u0442 \u0434\u0438\u0441\u0441\u0435\u0440\u0442\u0430\u0446\u0438\u0438", "section": "21 \u0421\u043a\u0440\u0438\u043d\u0448\u043e\u0442 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0438\u044f \u043d\u0430 \u0441\u0430\u0439\u0442\u0435 \u041c\u0418\u0424\u0418", "file": "Sources/variables_02_input.tex", "inputType": "text"}];
        
        const SPECIALTIES = [
            "1.1.1", "1.1.2", "6.6.5", "6.6.6", "6.6.7", "13.13.13", "14.14.14" // example list
        ];

        const App = () => {
            const [fields, setFields] = useState(initialFields);
            const [currentStep, setCurrentStep] = useState(0);

            // Group fields by file -> section
            const steps = useMemo(() => {
                const grouped = [];
                const files = [...new Set(fields.map(f => f.file))];
                files.forEach(file => {
                    const fileFields = fields.filter(f => f.file === file);
                    const sections = [...new Set(fileFields.map(f => f.section))];
                    sections.forEach(section => {
                        grouped.push({
                            file,
                            section,
                            fields: fileFields.filter(f => f.section === section)
                        });
                    });
                });
                return grouped;
            }, [fields]);

            const handleChange = (id, newValue) => {
                setFields(fields.map(f => f.id === id ? { ...f, value: newValue } : f));
            };

            const generateTex = (file) => {
                const fileFields = fields.filter(f => f.file === file);
                let mapBySection = {};
                fileFields.forEach(f => {
                    if (!mapBySection[f.section]) mapBySection[f.section] = [];
                    mapBySection[f.section].push(f);
                });

                let tex = '';
                for (const section in mapBySection) {
                    tex += `% ${section}\n`;
                    mapBySection[section].forEach(f => {
                        if (f.type === 'string') {
                            tex += `\\setkomavar{${f.id}}{${f.value}} % ${f.label}\n`;
                        } else {
                            tex += `\\setcounter{${f.id}}{${f.value}} % ${f.label}\n`;
                        }
                    });
                    tex += '\n';
                }
                return tex;
            };

            const handleSend = () => {
                const files = [...new Set(fields.map(f => f.file))];
                files.forEach(file => {
                    const tex = generateTex(file);
                    const blob = new Blob([tex], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.split('/').pop();
                    a.click();
                });
            };

            const step = steps[currentStep];

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-3xl bg-white shadow-xl rounded-2xl overflow-hidden">
                        <div className="bg-blue-600 p-6 text-white flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">{step.file.split('/').pop()}</h1>
                                <h2 className="text-lg opacity-90">{step.section}</h2>
                            </div>
                            <div className="text-sm font-medium bg-blue-700 px-3 py-1 rounded-full">
                                Шаг {currentStep + 1} из {steps.length}
                            </div>
                        </div>
                        
                        <div className="p-8 pb-32 max-h-[60vh] overflow-y-auto space-y-6">
                            {step.fields.map(field => (
                                <div key={field.id} className="flex flex-col">
                                    <label className="text-sm font-semibold text-gray-700 mb-2">
                                        {field.label} <span className="text-xs text-gray-400 font-normal">({field.id})</span>
                                    </label>
                                    
                                    {field.inputType === 'specialty_select' ? (
                                        <select
                                            value={field.value}
                                            onChange={(e) => handleChange(field.id, e.target.value)}
                                            className="border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm"
                                        >
                                            <option value="">Выберите специальность</option>
                                            {SPECIALTIES.map(s => (
                                                <option key={s} value={s}>{s}</option>
                                            ))}
                                        </select>
                                    ) : (
                                        <input
                                            type={field.inputType || 'text'}
                                            value={field.value}
                                            onChange={(e) => handleChange(field.id, e.target.value)}
                                            className="border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm"
                                        />
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="bg-gray-50 border-t border-gray-200 p-4 flex justify-between">
                            <button
                                disabled={currentStep === 0}
                                onClick={() => setCurrentStep(prev => prev - 1)}
                                className={`px-6 py-2 rounded-lg font-medium transition-colors ${currentStep === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}
                            >
                                Назад
                            </button>
                            
                            {currentStep === steps.length - 1 ? (
                                <button
                                    onClick={handleSend}
                                    className="px-6 py-2 rounded-lg font-bold bg-green-500 hover:bg-green-600 text-white transition-colors shadow"
                                >
                                    Отправить запрос
                                </button>
                            ) : (
                                <button
                                    onClick={() => setCurrentStep(prev => prev + 1)}
                                    className="px-6 py-2 rounded-lg font-bold bg-blue-600 hover:bg-blue-700 text-white transition-colors shadow"
                                >
                                    Вперед
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
